<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Robot 3D Model Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #070A13;
            font-family: monospace;
            user-select: none;
            -webkit-user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        /* Subtle cyber indicator overlay */
        #ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            color: #3D5AFE;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 5px #3D5AFE;
        }
        /* Scan active indicator tap hint */
        #tap-tip {
            position: absolute;
            top: 26px;
            left: 10px;
            pointer-events: none;
            color: #90A4AE;
            font-size: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            animation: pulse-glow 2s infinite alternate;
        }

        /* Highly polished Cyberpunk Diagnostic Scanner Overlay */
        #diagnostic-panel {
            position: absolute;
            bottom: 16px;
            right: -320px; /* Animate offscreen initially */
            width: 250px;
            background: rgba(11, 16, 35, 0.88);
            border: 1.5px solid #00F0FF;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.25);
            border-radius: 8px;
            padding: 12px;
            color: #E2E8F0;
            font-family: monospace;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: auto;
            z-index: 100;
        }
        #diagnostic-panel.active {
            right: 16px;
        }
        .panel-header {
            font-size: 11px;
            font-weight: bold;
            color: #00F0FF;
            border-bottom: 1px solid rgba(0, 240, 255, 0.3);
            padding-bottom: 6px;
            margin-bottom: 8px;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-header::after {
            content: "SCAN OK";
            font-size: 7px;
            background: rgba(0, 240, 255, 0.2);
            color: #00F0FF;
            padding: 1px 4px;
            border-radius: 2px;
            letter-spacing: 0.5px;
        }
        .panel-row {
            font-size: 10px;
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
        }
        .label {
            color: #708090;
            font-weight: bold;
        }
        .val {
            color: #FFFFFF;
            font-weight: bold;
        }
        #diag-category {
            color: #00E5FF;
        }
        /* Status Color Classes */
        .status-nominal {
            color: #00E676;
            text-transform: uppercase;
        }
        .status-offline {
            color: #757575;
            text-transform: uppercase;
        }
        .status-online {
            color: #00F0FF;
            text-transform: uppercase;
        }
        .panel-footer {
            margin-top: 8px;
            font-size: 7px;
            color: #00E5FF;
            text-align: center;
            opacity: 0.7;
            letter-spacing: 0.5px;
            border-top: 1px dashed rgba(0, 240, 255, 0.15);
            padding-top: 6px;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.4; }
            100% { opacity: 0.95; color: #00F0FF; }
        }
    </style>
    <!-- Three.js & OrbitControls from dependable CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="ui-overlay">SYS // 3D GL-RENDER ACTIVE</div>
    <div id="tap-tip">TAP A COMPONENT TO INITIATE TELEMETRY SCAN</div>
    
    <!-- Cyber Diagnostic Overlay Panel -->
    <div id="diagnostic-panel">
        <div class="panel-header">PART DIAGNOSTICS</div>
        <div class="panel-row"><span class="label">MODULE:</span> <span class="val" id="diag-name">N/A</span></div>
        <div class="panel-row"><span class="label">SECTION:</span> <span class="val" id="diag-category">N/A</span></div>
        <div class="panel-row"><span class="label">STATUS:</span> <span class="val" id="diag-status">N/A</span></div>
        <div class="panel-row"><span class="label">INTEGRITY:</span> <span class="val" id="diag-integrity">100%</span></div>
        <div class="panel-row"><span class="label">MASS COEF:</span> <span class="val" id="diag-mass">0.0 kg</span></div>
        <div class="panel-row"><span class="label">EFFICIENCY:</span> <span class="val" id="diag-efficiency">100%</span></div>
        <div class="panel-footer">GRID ALIGNED // ROTATION ACTIVE</div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // RobotPart modular class definition
        class RobotPart {
            constructor(id, displayName, category, group) {
                this.id = id; // "head", "chassis", "hat", "left_arm", "right_arm", "utility", "legs"
                this.displayName = displayName;
                this.category = category; // "HEAD_UNIT", "CORE_CHASSIS", "AUX_HAT", "ARM_LEFT", "ARM_RIGHT", "AUX_UTILITY", "MOBILITY"
                this.group = group;

                // Tag all descendents for Raycast interaction
                this.group.traverse(child => {
                    if (child.isMesh) {
                        child.userData.partId = id;
                        child.userData.partName = displayName;
                        child.userData.partCategory = category;
                    }
                });
            }
        }

        // Global components for dynamic updates and animation tracking
        let scene, camera, renderer, controls;
        let robotGroup;
        let particlesGroup;
        const particleCount = 80;
        let robotParts = {};
        let selectedPartId = null;
        let selectionBoxHelper = null;
        let raycaster, mouse;

        let animatedParts = {
            drills: [],
            fans: [],
            radars: [],
            thrusters: [],
            wheels: [],
            leftArmGroup: null,
            rightArmGroup: null,
            leftBipedLeg: null,
            rightBipedLeg: null,
            springGroup: null,
            claws: []
        };
        
        // Robot state variables
        let currentPaint = "#3D5AFE";
        let currentEyes = "digital";
        let currentHat = "none";
        let currentLegs = "Standard Legs";
        let currentLeftArm = "Standard Arm";
        let currentRightArm = "Standard Arm";
        let currentUtility = "Empty";

        let currentHeadStyle = "Standard Dome";
        let currentHeadMaterial = "Chrome Metal";
        let currentTorsoStyle = "Fusion Frame";
        let currentTorsoMaterial = "Chrome Metal";
        let currentArmsStyle = "Standard Claw";
        let currentArmsMaterial = "Chrome Metal";
        let currentLegsStyle = "Standard Biped";
        let currentLegsMaterial = "Chrome Metal";
        let currentAnimation = "Idle Float";
        let isAnimationPlaying = true;

        // Init scene on window load
        window.onload = function() {
            initThree();
            buildDefaultRobot();
            animate();
        };

        function initThree() {
            const container = document.getElementById('canvas-container');
            
            // Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x070A13);
            scene.fog = new THREE.FogExp2(0x070A13, 0.035);

            // Among Us Style Moving Starfield
            const starGeo = new THREE.BufferGeometry();
            const starCount = 300;
            const starPositions = new Float32Array(starCount * 3);
            const starSpeeds = [];

            for (let i = 0; i < starCount; i++) {
                starPositions[i * 3] = (Math.random() - 0.5) * 50;     // X
                starPositions[i * 3 + 1] = Math.random() * 20 - 5;     // Y
                starPositions[i * 3 + 2] = (Math.random() - 0.5) * 50; // Z
                
                starSpeeds.push({
                    x: -0.01 - Math.random() * 0.04,
                    y: (Math.random() - 0.5) * 0.005,
                    z: (Math.random() - 0.5) * 0.01
                });
            }

            starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starMat = new THREE.PointsMaterial({
                color: 0xFFFFFF,
                size: 0.15,
                transparent: true,
                opacity: 0.8
            });

            const starField = new THREE.Points(starGeo, starMat);
            scene.add(starField);
            
            scene.userData.starField = starField;
            scene.userData.starSpeeds = starSpeeds;
            scene.userData.starCount = starCount;

            // Camera Setup
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 4, 10);

            // Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Orbit Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 4;
            controls.maxDistance = 18;
            controls.maxPolarAngle = Math.PI / 2 - 0.02; // Prevent going below floor
            controls.target.set(0, 2.2, 0);

            // Lighting Setup
            // 1. Cyber Ambient Light
            const ambientLight = new THREE.AmbientLight(0x1a213a, 1.2);
            scene.add(ambientLight);

            // 2. High-contrast Key light
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(10, 15, 8);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 25;
            dirLight.shadow.camera.left = -6;
            dirLight.shadow.camera.right = 6;
            dirLight.shadow.camera.top = 6;
            dirLight.shadow.camera.bottom = -6;
            dirLight.shadow.bias = -0.0005;
            scene.add(dirLight);

            // 3. Cyber neon edge light (opposite to key light)
            const edgeLight = new THREE.DirectionalLight(0x3D5AFE, 1.8);
            edgeLight.position.set(-10, 8, -8);
            scene.add(edgeLight);

            // 4. Subtle accent fill from bottom-front
            const fillLight = new THREE.DirectionalLight(0x00E676, 0.4);
            fillLight.position.set(0, -5, 5);
            scene.add(fillLight);

            // Custom Spaceship Steel Deck Plating Floor (Among Us Style)
            const floorGroup = new THREE.Group();
            scene.add(floorGroup);
            
            // Solid plate deck base
            const floorGeo = new THREE.PlaneGeometry(60, 60);
            const floorMat = new THREE.MeshStandardMaterial({
                color: 0x161D2E, // Spaceship dark steel gray-blue
                roughness: 0.9,
                metalness: 0.1
            });
            const deckBase = new THREE.Mesh(floorGeo, floorMat);
            deckBase.rotation.x = -Math.PI / 2;
            deckBase.receiveShadow = true;
            floorGroup.add(deckBase);

            // Bold dark floor seams (grid plates)
            const seamMat = new THREE.LineBasicMaterial({ color: 0x05070D });
            const seamGeo = new THREE.BufferGeometry();
            const seamVertices = [];
            
            // Grid spacing of 4 units per metal panel
            for (let i = -32; i <= 32; i += 4) {
                // Vertical lines
                seamVertices.push(i, 0.015, -32);
                seamVertices.push(i, 0.015, 32);
                // Horizontal lines
                seamVertices.push(-32, 0.015, i);
                seamVertices.push(32, 0.015, i);
            }
            seamGeo.setAttribute('position', new THREE.Float32BufferAttribute(seamVertices, 3));
            const seams = new THREE.LineSegments(seamGeo, seamMat);
            floorGroup.add(seams);

            // Small circular deck rivet heads at panel corners
            const rivetGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.01, 5);
            const rivetMat = new THREE.MeshStandardMaterial({ color: 0x0C101A, roughness: 0.95 });
            
            // Populate rivets slightly inset from intersection corners
            for (let x = -28; x <= 28; x += 4) {
                for (let z = -28; z <= 28; z += 4) {
                    const offsets = [
                        [-0.15, -0.15], [0.15, -0.15], [-0.15, 0.15], [0.15, 0.15]
                    ];
                    offsets.forEach(off => {
                        const rivet = new THREE.Mesh(rivetGeo, rivetMat);
                        rivet.position.set(x + off[0], 0.02, z + off[1]);
                        floorGroup.add(rivet);
                    });
                }
            }

            // Main Robot Group
            robotGroup = new THREE.Group();
            scene.add(robotGroup);

            // Ambient Floating Dust Particle Field (Professional Garage Aesthetic)
            particlesGroup = new THREE.Group();
            scene.add(particlesGroup);

            const particleGeo = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const particleData = [];

            for (let i = 0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 1.0 + Math.random() * 4.5;
                const x = Math.cos(angle) * radius;
                const y = Math.random() * 6.0;
                const z = Math.sin(angle) * radius;

                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z;

                particleData.push({
                    speedY: 0.003 + Math.random() * 0.006,
                    angleSpeed: (Math.random() - 0.5) * 0.006,
                    radius: radius,
                    angle: angle,
                    baseY: y
                });
            }

            particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const particleMat = new THREE.PointsMaterial({
                color: 0x3D5AFE,
                size: 0.09,
                transparent: true,
                opacity: 0.65,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            const pointParticles = new THREE.Points(particleGeo, particleMat);
            particlesGroup.add(pointParticles);
            particlesGroup.userData = { data: particleData, geo: particleGeo };

            // Raycasting & Interaction setup
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('mousemove', onMouseMove, false);
            window.addEventListener('click', onMouseClick, false);
            window.addEventListener('touchstart', onTouchStart, { passive: false });
            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- INTERACTIVITY HANDLERS ---
        
        function onMouseMove(event) {
            // Normalized Device Coordinates
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(robotGroup.children, true);

            let overInteractivePart = false;
            for (let i = 0; i < intersects.length; i++) {
                if (intersects[i].object.userData && intersects[i].object.userData.partId) {
                    overInteractivePart = true;
                    break;
                }
            }
            document.body.style.cursor = overInteractivePart ? 'pointer' : 'default';
        }

        function onMouseClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            handlePartSelection();
        }

        function onTouchStart(event) {
            if (event.touches.length > 0) {
                mouse.x = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;
                handlePartSelection();
            }
        }

        function handlePartSelection() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(robotGroup.children, true);

            let clickedPartId = null;
            for (let i = 0; i < intersects.length; i++) {
                const obj = intersects[i].object;
                if (obj.userData && obj.userData.partId) {
                    clickedPartId = obj.userData.partId;
                    break;
                }
            }

            if (clickedPartId && robotParts[clickedPartId]) {
                selectPart(clickedPartId);
            } else {
                clearSelection();
            }
        }

        function selectPart(partId) {
            const part = robotParts[partId];
            if (!part) return;

            selectedPartId = partId;

            // Clear previous helper if any
            if (selectionBoxHelper) {
                scene.remove(selectionBoxHelper);
            }

            // Create a gorgeous neon green-blue wireframe bounding helper
            selectionBoxHelper = new THREE.BoxHelper(part.group, 0x00F0FF);
            selectionBoxHelper.material.color.setHex(0x00F0FF);
            selectionBoxHelper.material.linewidth = 2;
            scene.add(selectionBoxHelper);

            // Fetch high-fidelity specifications for diagnostic readout
            const specs = getPartSpecs(partId, part.displayName);

            // Populating UI Overlay
            document.getElementById('diag-name').innerText = specs.name.toUpperCase();
            document.getElementById('diag-category').innerText = specs.category.toUpperCase();
            document.getElementById('diag-status').innerText = specs.status.toUpperCase();
            document.getElementById('diag-status').className = 'val ' + specs.statusStyle;
            document.getElementById('diag-integrity').innerText = specs.integrity;
            document.getElementById('diag-mass').innerText = specs.mass;
            document.getElementById('diag-efficiency').innerText = specs.efficiency;

            // Add active transition to diagnostic slide panel
            document.getElementById('diagnostic-panel').classList.add('active');
        }

        function clearSelection() {
            selectedPartId = null;
            if (selectionBoxHelper) {
                scene.remove(selectionBoxHelper);
                selectionBoxHelper = null;
            }
            document.getElementById('diagnostic-panel').classList.remove('active');
        }

        // Generate customized telemetry statistics based on current selected specs
        function getPartSpecs(partId, displayName) {
            let name = displayName;
            let category = "MODULE";
            let status = "nominal";
            let statusStyle = "status-nominal";
            let integrity = "100%";
            let mass = "4.0 kg";
            let efficiency = "98%";

            switch(partId) {
                case "chassis":
                    category = "CORE_CHASSIS";
                    name = "Titanium Fusion Frame";
                    status = "reactor stable";
                    statusStyle = "status-nominal";
                    mass = "35.0 kg";
                    efficiency = "99%";
                    break;
                case "head":
                    category = "HEAD_UNIT";
                    name = currentEyes === "digital" ? "Digital Visor Dome" :
                           currentEyes === "retro" ? "Retro Dual-Lens Core" :
                           currentEyes === "laser" ? "Mono-Laser Visor" : "Goggles Optics Module";
                    status = "scanning active";
                    statusStyle = "status-online";
                    mass = "4.5 kg";
                    efficiency = "96%";
                    break;
                case "hat":
                    category = "AUX_ATTACHMENT";
                    name = currentHat === "none" ? "Empty Bay" :
                           currentHat === "builder" ? "Construction Hardhat" :
                           currentHat === "top_hat" ? "Dapper Top Hat" :
                           currentHat === "builder_crown" ? "Royal Crown Dome" : "Antenna Transceiver";
                    status = currentHat === "none" ? "offline" : "online";
                    statusStyle = currentHat === "none" ? "status-offline" : "status-online";
                    integrity = currentHat === "none" ? "0%" : "100%";
                    mass = currentHat === "none" ? "0.0 kg" : "1.2 kg";
                    efficiency = currentHat === "none" ? "0%" : "99%";
                    break;
                case "left_arm":
                    category = "ARM_LEFT";
                    name = currentLeftArm;
                    status = "weapons loaded";
                    statusStyle = "status-nominal";
                    mass = currentLeftArm === "Standard Arm" ? "6.0 kg" :
                           currentLeftArm === "Claw Arm" ? "9.5 kg" :
                           currentLeftArm === "Laser Blaster" ? "12.0 kg" :
                           currentLeftArm === "Drill Arm" ? "14.0 kg" :
                           currentLeftArm === "Plasma Cannon" ? "18.5 kg" : "11.0 kg"; // Shield
                    efficiency = currentLeftArm === "Plasma Cannon" ? "91%" : "95%";
                    break;
                case "right_arm":
                    category = "ARM_RIGHT";
                    name = currentRightArm;
                    status = "weapons loaded";
                    statusStyle = "status-nominal";
                    mass = currentRightArm === "Standard Arm" ? "6.0 kg" :
                           currentRightArm === "Claw Arm" ? "9.5 kg" :
                           currentRightArm === "Laser Blaster" ? "12.0 kg" :
                           currentRightArm === "Drill Arm" ? "14.0 kg" :
                           currentRightArm === "Plasma Cannon" ? "18.5 kg" : "11.0 kg"; // Shield
                    efficiency = currentRightArm === "Plasma Cannon" ? "91%" : "95%";
                    break;
                case "utility":
                    category = "AUX_UTILITY";
                    name = currentUtility === "Empty" ? "Empty Slot" : currentUtility;
                    status = currentUtility === "Empty" ? "offline" : "system online";
                    statusStyle = currentUtility === "Empty" ? "status-offline" : "status-online";
                    integrity = currentUtility === "Empty" ? "0%" : "100%";
                    mass = currentUtility === "Empty" ? "0.0 kg" :
                           currentUtility === "Cooling System" ? "12.0 kg" :
                           currentUtility === "Turbo Battery" ? "15.0 kg" : "8.5 kg";
                    efficiency = currentUtility === "Empty" ? "0%" : "97%";
                    break;
                case "legs":
                    category = "MOBILITY_SYSTEM";
                    name = currentLegs;
                    status = "traction active";
                    statusStyle = "status-nominal";
                    mass = currentLegs === "Standard Legs" ? "18.0 kg" :
                           currentLegs === "Heavy Tracks" ? "45.0 kg" :
                           currentLegs === "All-Terrain Wheels" ? "22.0 kg" :
                           currentLegs === "Hover Engine" ? "15.0 kg" :
                           currentLegs === "Jump Springs" ? "14.0 kg" : "25.0 kg"; // Jetpack
                    efficiency = currentLegs === "Hover Engine" ? "97%" : "92%";
                    break;
            }

            return { name, category, status, statusStyle, integrity, mass, efficiency };
        }

        // --- ROBOT MODEL BUILDING BLOCKS ---
        
        function buildDefaultRobot() {
            rebuildRobot();
        }

        function clearGroup(group) {
            while(group.children.length > 0){ 
                const obj = group.children[0];
                group.remove(obj); 
            }
        }

        function createOutlinedMesh(geometry, material, outlineScale = 1.08) {
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            const outlineMaterial = new THREE.MeshBasicMaterial({
                color: 0x070A13,
                side: THREE.BackSide
            });
            const outlineMesh = new THREE.Mesh(geometry, outlineMaterial);
            outlineMesh.scale.set(outlineScale, outlineScale, outlineScale);
            mesh.add(outlineMesh);
            
            return mesh;
        }

        function createMaterial(materialName, defaultColor) {
            let colorHex;
            if (typeof defaultColor === "string") {
                let hexStr = defaultColor.replace("#", "");
                if (hexStr.length === 8) {
                    hexStr = hexStr.substring(2); // strip alpha prefix
                }
                colorHex = parseInt("0x" + hexStr);
            } else if (typeof defaultColor === "number") {
                colorHex = defaultColor;
                if (colorHex > 0xFFFFFF) {
                    colorHex = colorHex & 0xFFFFFF; // mask off alpha channel bits
                }
            } else {
                colorHex = 0x3D5AFE;
            }

            switch (materialName) {
                case "Chrome Metal":
                    return new THREE.MeshStandardMaterial({
                        color: colorHex,
                        roughness: 0.15,
                        metalness: 0.95
                    });
                case "Golden Cyber":
                    return new THREE.MeshStandardMaterial({
                        color: 0xFFD600,
                        roughness: 0.15,
                        metalness: 0.95
                    });
                case "Carbon Fiber":
                    // Dark carbon fiber style, with a subtle tint of the paint color
                    const r = ((colorHex >> 16) & 255) * 0.12;
                    const g = ((colorHex >> 8) & 255) * 0.12;
                    const b = (colorHex & 255) * 0.12;
                    const darkColor = (Math.round(r) << 16) | (Math.round(g) << 8) | Math.round(b);
                    return new THREE.MeshStandardMaterial({
                        color: darkColor,
                        roughness: 0.6,
                        metalness: 0.3
                    });
                case "Rusty Scrapyard":
                    // Rusty mixed with paint color
                    const paintR = ((colorHex >> 16) & 255);
                    const paintG = ((colorHex >> 8) & 255);
                    const paintB = (colorHex & 255);
                    const mixedR = Math.round(0.7 * 0x8D + 0.3 * paintR);
                    const mixedG = Math.round(0.7 * 0x52 + 0.3 * paintG);
                    const mixedB = Math.round(0.7 * 0x3C + 0.3 * paintB);
                    const rustColor = (mixedR << 16) | (mixedG << 8) | mixedB;
                    return new THREE.MeshStandardMaterial({
                        color: rustColor,
                        roughness: 0.85,
                        metalness: 0.1
                    });
                case "Neon Grid":
                    return new THREE.MeshStandardMaterial({
                        color: colorHex,
                        roughness: 0.2,
                        metalness: 0.5,
                        emissive: colorHex,
                        emissiveIntensity: 0.8
                    });
                case "Crewmate Cel":
                    return new THREE.MeshToonMaterial({
                        color: colorHex,
                        roughness: 0.95,
                        metalness: 0.0
                    });
                default:
                    return new THREE.MeshStandardMaterial({
                        color: colorHex,
                        roughness: 0.3,
                        metalness: 0.8
                    });
            }
        }

        function buildArm(parentGroup, isLeft, type, paintColor, metallicMat, darkMetalMat, goldMat, glowingCyanMat, glowingOrangeMat) {
            const sideSign = isLeft ? -1 : 1;
            const armRoot = new THREE.Group();
            armRoot.position.set(sideSign * 0.98, 0.4, 0);
            parentGroup.add(armRoot);

            const shoulderJoint = new THREE.Mesh(new THREE.SphereGeometry(0.14, 12, 12), darkMetalMat);
            armRoot.add(shoulderJoint);

            const limbGeo = new THREE.CylinderGeometry(0.08, 0.07, 0.5, 8);
            const upperArm = new THREE.Mesh(limbGeo, metallicMat);
            upperArm.position.set(sideSign * 0.18, -0.25, 0);
            upperArm.rotation.z = -sideSign * 0.25;
            upperArm.castShadow = true;
            armRoot.add(upperArm);

            const elbow = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), darkMetalMat);
            elbow.position.set(sideSign * 0.28, -0.5, 0);
            armRoot.add(elbow);

            const foreArm = new THREE.Mesh(limbGeo, metallicMat);
            foreArm.position.set(sideSign * 0.38, -0.75, 0);
            foreArm.rotation.z = -sideSign * 0.12;
            foreArm.castShadow = true;
            armRoot.add(foreArm);

            const toolPos = new THREE.Vector3(sideSign * 0.45, -1.0, 0.05);

            if (type === "Claw Arm") {
                const clawRoot = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.15, 0.18), darkMetalMat);
                clawRoot.position.copy(toolPos);
                armRoot.add(clawRoot);

                const clawMat = new THREE.MeshStandardMaterial({ color: 0x9e9e9e, metalness: 0.8, roughness: 0.2 });
                const pincerGeo = new THREE.TorusGeometry(0.14, 0.04, 6, 12, Math.PI);
                
                const leftPincer = new THREE.Mesh(pincerGeo, clawMat);
                leftPincer.position.set(toolPos.x + sideSign * 0.05, toolPos.y - 0.12, toolPos.z);
                leftPincer.rotation.z = Math.PI / 2;
                armRoot.add(leftPincer);

                const rightPincer = new THREE.Mesh(pincerGeo, clawMat);
                rightPincer.position.set(toolPos.x - sideSign * 0.05, toolPos.y - 0.12, toolPos.z);
                rightPincer.rotation.z = -Math.PI / 2;
                armRoot.add(rightPincer);

                animatedParts.claws.push({ left: leftPincer, right: rightPincer, sideSign: sideSign });

            } else if (type === "Laser Blaster") {
                const barrelGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.45, 12);
                barrelGeo.rotateX(Math.PI / 2);
                const barrel = new THREE.Mesh(barrelGeo, darkMetalMat);
                barrel.position.copy(toolPos);
                barrel.castShadow = true;
                armRoot.add(barrel);

                const ringGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.05, 12);
                ringGeo.rotateX(Math.PI / 2);
                const ring = new THREE.Mesh(ringGeo, goldMat);
                ring.position.set(toolPos.x, toolPos.y, toolPos.z + 0.05);
                armRoot.add(ring);

                const flashGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.08, 12);
                flashGeo.rotateX(Math.PI / 2);
                const flash = new THREE.Mesh(flashGeo, glowingCyanMat);
                flash.position.set(toolPos.x, toolPos.y, toolPos.z + 0.22);
                armRoot.add(flash);

            } else if (type === "Drill Arm") {
                const drillHolder = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.15, 12), darkMetalMat);
                drillHolder.position.copy(toolPos);
                armRoot.add(drillHolder);

                const drillGeo = new THREE.ConeGeometry(0.18, 0.55, 12);
                drillGeo.rotateX(Math.PI / 2);
                const drill = new THREE.Mesh(drillGeo, goldMat);
                drill.position.set(toolPos.x, toolPos.y - 0.15, toolPos.z);
                armRoot.add(drill);
                animatedParts.drills.push(drill);

            } else if (type === "Plasma Cannon") {
                const baseGeo = new THREE.BoxGeometry(0.24, 0.18, 0.35);
                const canonBase = new THREE.Mesh(baseGeo, darkMetalMat);
                canonBase.position.copy(toolPos);
                armRoot.add(canonBase);

                const barrelGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.4, 8);
                barrelGeo.rotateX(Math.PI / 2);
                
                const b1 = new THREE.Mesh(barrelGeo, metallicMat);
                b1.position.set(toolPos.x - 0.07, toolPos.y, toolPos.z + 0.15);
                b1.castShadow = true;
                const b2 = new THREE.Mesh(barrelGeo, metallicMat);
                b2.position.set(toolPos.x + 0.07, toolPos.y, toolPos.z + 0.15);
                b2.castShadow = true;

                armRoot.add(b1);

            } else if (type === "Shield Arm") {

                wrist.position.copy(toolPos);
                armRoot.add(wrist);

                const fist = new THREE.Mesh(new THREE.SphereGeometry(0.11, 8, 8), metallicMat);
                fist.position.set(toolPos.x, toolPos.y - 0.08, toolPos.z);
                armRoot.add(fist);
            }
        }

        // --- ANIMATE / RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.001;

            if (isAnimationPlaying) {
                // 1. Slow, natural idle float / breathing motion
                const breatheRoot = scene.getObjectByName("BreathingRoot");
                if (breatheRoot) {
                    if (currentAnimation === "Idle Float" || currentAnimation === "Radar Scan") {
                        breatheRoot.position.y = Math.sin(time * 2.2) * 0.02;
                        breatheRoot.rotation.z = Math.sin(time * 1.5) * 0.005;
                        breatheRoot.rotation.x = Math.sin(time * 1.1) * 0.003;
                    } else if (currentAnimation === "Disco Party") {
                        breatheRoot.position.y = Math.sin(time * 6) * 0.05;
                        breatheRoot.rotation.z = Math.sin(time * 4) * 0.02;
                    } else {
                        // Standard breathing fallback
                        breatheRoot.position.y = Math.sin(time * 2.2) * 0.0015;
                    }
                }

                // 2. Rotate drills
                animatedParts.drills.forEach(drill => {
                    const speed = currentAnimation === "Weapon Test" ? 0.8 : 0.28;
                    drill.rotation.y += speed;
                });

                // 3. Spin cooling system fans
                animatedParts.fans.forEach(fan => {
                    fan.rotation.y += 0.18;
                });

                // 4. Spin Object Detector/Radar dishes
                animatedParts.radars.forEach(radar => {
                    radar.rotation.y += 0.03;
                });

                // 5. Pulsing hover repulsor exhaust glow and jet engines
                animatedParts.thrusters.forEach(thruster => {
                    const speedMultiplier = currentAnimation === "Walk Cycle" ? 2.0 : 1.0;
                    const pulse = 0.95 + Math.sin(time * 45 * speedMultiplier) * 0.12;
                    thruster.scale.set(pulse, pulse, pulse);
                });

                // 6. Custom Arm / Weapon Testing Animation
                if (currentAnimation === "Weapon Test") {
                    if (animatedParts.leftArmGroup) {
                        animatedParts.leftArmGroup.rotation.x = -Math.PI / 3 + Math.sin(time * 8) * 0.15;
                    }
                    if (animatedParts.rightArmGroup) {
                        animatedParts.rightArmGroup.rotation.x = -Math.PI / 3 + Math.sin(time * 9) * 0.15;
                    }
                    // Snap claw pincers if present
                    animatedParts.claws.forEach(claw => {
                        const angle = Math.sin(time * 12) * 0.4;
                        claw.left.rotation.z = Math.PI / 2 + angle;
                        claw.right.rotation.z = -Math.PI / 2 - angle;
                    });
                } else {
                    // Reset arm positions
                    if (animatedParts.leftArmGroup) {
                        animatedParts.leftArmGroup.rotation.x = 0;
                    }
                    if (animatedParts.rightArmGroup) {
                        animatedParts.rightArmGroup.rotation.x = 0;
                    }
                    // Reset claw pincers
                    animatedParts.claws.forEach(claw => {
                        claw.left.rotation.z = Math.PI / 2;
                        claw.right.rotation.z = -Math.PI / 2;
                    });
                }

                // 7. Custom Walk Cycle Animation
                if (currentAnimation === "Walk Cycle") {
                    // Biped legs swinging
                    if (animatedParts.leftBipedLeg) {
                        animatedParts.leftBipedLeg.rotation.x = Math.sin(time * 7) * 0.5;
                    }
                    if (animatedParts.rightBipedLeg) {
                        animatedParts.rightBipedLeg.rotation.x = -Math.sin(time * 7) * 0.5;
                    }
                    // Spring leg compressing/bouncing
                    if (animatedParts.springGroup) {
                        animatedParts.springGroup.scale.y = 1.0 + Math.sin(time * 14) * 0.3;
                    }
                    // Rotate wheels faster
                    animatedParts.wheels.forEach(wheel => {
                        wheel.rotation.x += 0.25;
                    });
                } else {
                    // Reset walk cycle
                    if (animatedParts.leftBipedLeg) {
                        animatedParts.leftBipedLeg.rotation.x = 0;
                    }
                    if (animatedParts.rightBipedLeg) {
                        animatedParts.rightBipedLeg.rotation.x = 0;
                    }
                    if (animatedParts.springGroup) {
                        animatedParts.springGroup.scale.y = 1.0;
                    }
                }

                // 8. Radar Scan Head Sweeping
                const headNode = robotParts["head"] ? robotParts["head"].group : null;
                if (headNode) {
                    if (currentAnimation === "Radar Scan") {
                        headNode.rotation.y = Math.sin(time * 2.0) * 0.6;
                    } else {
                        headNode.rotation.y = 0;
                    }
                }

                // 9. Disco Party Animation
                if (currentAnimation === "Disco Party") {
                    robotGroup.rotation.y = time * 1.5;
                    // Flash any Neon Grid material if selected
                    scene.traverse(child => {
                        if (child.isMesh && child.material && child.material.emissive) {
                            child.material.emissive.setHSL((time * 0.5) % 1.0, 1.0, 0.5);
                        }
                    });
                } else {
                    robotGroup.rotation.y = 0;
                }
            }

            // 10. Update neon selection box location/bounds to follow breathing animations seamlessly
            if (selectionBoxHelper) {
                selectionBoxHelper.update();
            }

            // 11. Ambient Floating Cyber Particles update
            if (particlesGroup && particlesGroup.userData && particlesGroup.userData.geo) {
                const points = particlesGroup.children[0];
                const posArr = points.geometry.attributes.position.array;
                const pData = particlesGroup.userData.data;

                for (let i = 0; i < particleCount; i++) {
                    const data = pData[i];
                    // Floating upwards
                    posArr[i * 3 + 1] += data.speedY;
                    
                    // Orbiting around center
                    data.angle += data.angleSpeed;
                    posArr[i * 3] = Math.cos(data.angle) * data.radius;
                    posArr[i * 3 + 2] = Math.sin(data.angle) * data.radius;

                    // Reset when reaching top boundary
                    if (posArr[i * 3 + 1] > 6.0) {
                        posArr[i * 3 + 1] = 0;
                    }
                }
                points.geometry.attributes.position.needsUpdate = true;
                
                // Dynamically morph particle colors to match current paint color
                if (points.material) {
                    points.material.color.lerp(new THREE.Color(currentPaint), 0.05);
                }
            }

            // Update space starfield drift
            if (scene.userData.starField) {
                const starPoints = scene.userData.starField;
                const starPositions = starPoints.geometry.attributes.position.array;
                const starSpeeds = scene.userData.starSpeeds;
                const count = scene.userData.starCount;

                for (let i = 0; i < count; i++) {
                    starPositions[i * 3] += starSpeeds[i].x;
                    starPositions[i * 3 + 1] += starSpeeds[i].y;
                    starPositions[i * 3 + 2] += starSpeeds[i].z;

                    // If a star gets too far left, wrap it back to the right
                    if (starPositions[i * 3] < -25) {
                        starPositions[i * 3] = 25;
                        starPositions[i * 3 + 1] = Math.random() * 20 - 5;
                        starPositions[i * 3 + 2] = (Math.random() - 0.5) * 50;
                    }
                }
                starPoints.geometry.attributes.position.needsUpdate = true;
            }

            // Update camera & controls
            controls.update();
            renderer.render(scene, camera);
        }

        // --- EXPOSED INTERFACE FOR ANDROID WEBVIEW CALLS ---
        window.updateRobot = function(
            paintColor, eyesType, hatType, legs, leftArm, rightArm, utility,
            headStyle, headMaterial, torsoStyle, torsoMaterial,
            armsStyle, armsMaterial, legsStyle, legsMaterial,
            activeAnimation, isAnimating
        ) {
            currentPaint = paintColor || "#3D5AFE";
            currentEyes = eyesType || "digital";
            currentHat = hatType || "none";
            currentLegs = legs || "Standard Legs";
            currentLeftArm = leftArm || "Standard Arm";
            currentRightArm = rightArm || "Standard Arm";
            currentUtility = utility || "Empty";

            currentHeadStyle = headStyle || "Standard Dome";
            currentHeadMaterial = headMaterial || "Chrome Metal";
            currentTorsoStyle = torsoStyle || "Fusion Frame";
            currentTorsoMaterial = torsoMaterial || "Chrome Metal";
            currentArmsStyle = armsStyle || "Standard Claw";
            currentArmsMaterial = armsMaterial || "Chrome Metal";
            currentLegsStyle = legsStyle || "Standard Biped";
